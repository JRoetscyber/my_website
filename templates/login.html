<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - JO4 Dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    :root {
      --login-card-w: 400px;
    }
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      margin: 0;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }
    .login-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--login-card-w);
      padding: 20px;
      animation: fadeInUp 0.6s ease both;
    }
    .login-card {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 40px;
      box-shadow: var(--shadow-card);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--color-text-primary);
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }
    .login-tag {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-text-muted);
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: var(--color-surface-3);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 12px 16px;
      color: var(--color-text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 204, 0.1);
    }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 14px;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 10px;
    }
    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: var(--accent-glow);
    }
    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .alert-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">JO4<span>.</span>DEV</div>
        <div class="login-tag">Admin Access</div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="login-btn">Secure Login</button>
      </form>
    </div>
  </div>
</body>
</html>
