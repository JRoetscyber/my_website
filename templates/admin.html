              <!-- Top pages -->
              <div style="margin-top:20px;">
                <div style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:10px;">
                  Top Pages
                </div>
                <div class="d-flex flex-column gap-2">
                  {% for page in top_pages %}
                  <div style="display:flex;align-items:center;gap:12px;">
                    <span style="font-family:var(--font-mono);font-size:0.68rem;color:var(--color-text-secondary);min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ page.path }}</span>
                    <div style="flex:1;height:3px;background:var(--color-border);border-radius:2px;overflow:hidden;">
                      <div style="height:100%;width:{{ page.percentage }}%;background:var(--accent);border-radius:2px;"></div>
                    </div>
                    <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--color-text-muted);flex-shrink:0;">{{ page.count }}</span>
                  </div>
                  {% else %}
                  <div style="font-family:var(--font-mono);font-size:0.68rem;color:var(--color-text-muted);">No traffic data available.</div>
                  {% endfor %}
                </div>
              </div>
