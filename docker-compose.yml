version: '3.8'

services:
  web:
    build: .
    restart: always
    ports:
      - "6010:6010" # Map container port 6010 to host port 6010
    volumes:
      - app-data:/app/instance # Persist the database file
    env_file:
      - .env
    # For Cloudflare Tunnel, you might not need to expose ports directly to the host
    # but it's good for local testing. If Cloudflare is directly forwarding,
    # then the host's 6010 port just needs to be accessible by cloudflared.
    # On a Raspberry Pi, cloudflared often runs on the host directly.

volumes:
  app-data:
    # This volume will store your SQLite database (jo4dev.db)
    # in a persistent location managed by Docker.
    # The actual location on the host can be found with `docker volume inspect app-data`
